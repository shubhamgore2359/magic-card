<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magic Shivnya</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow:hidden;
  text-align:center;
}

/* Gift Box */
.gift {
  font-size:50px;
  cursor:pointer;
  margin-top:100px;
  animation: bounce 1.5s infinite;
}
@keyframes bounce {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* Card */
.card {
  display:none;
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  animation:fadeIn 2s;
}

.name {
  font-size:28px;
  color:white;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from {text-shadow:0 0 10px pink;}
  to {text-shadow:0 0 20px white;}
}

.slideshow img {
  width:220px;
  border-radius:20px;
  box-shadow:0 0 20px pink;
}

/* Animations */
.butterfly {
  position:absolute;
  width:40px;
  animation:fly linear infinite;
}
@keyframes fly {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

.heart {
  position:absolute;
  font-size:20px;
  animation:float 6s linear infinite;
}
@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

.confetti {
  position:absolute;
  width:8px;
  height:8px;
  animation:confettiFall 4s linear infinite;
}
@keyframes confettiFall {
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(100vh);}
}

.typing {
  color:white;
  margin-top:15px;
}

@keyframes fadeIn {
  from{opacity:0;}
  to{opacity:1;}
}

/* Sparkle */
.sparkle {
  position:absolute;
  color:white;
  animation: spark 1s linear;
}
@keyframes spark {
  from{opacity:1;}
  to{opacity:0; transform:translateY(-20px);}
}
</style>

</head>

<body>

<div class="gift" onclick="openMagic()">🎁</div>

<div class="card" id="card">
  <div class="name">Shivnya Deepak Gore 💖</div>

  <div class="slideshow">
    <img id="slide" src="shivnya.jpg">
  </div>

  <p class="typing" id="msg"></p>
</div>

<audio id="music" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
function openMagic(){

  document.querySelector(".gift").style.display="none";
  document.getElementById("card").style.display="block";
  document.getElementById("music").play();

  // butterflies
  for(let i=0;i<15;i++){
    let b=document.createElement("img");
    b.src="https://i.imgur.com/QZ6KQKZ.png";
    b.className="butterfly";
    b.style.left=Math.random()*100+"vw";
    b.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(b);
  }

  // hearts
  for(let i=0;i<12;i++){
    let h=document.createElement("div");
    h.innerHTML="❤️";
    h.className="heart";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
  }

  // confetti
  for(let i=0;i<30;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["red","yellow","blue","green"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
  }

  // typing text
  let text="You are truly special and magical ✨💖";
  let i=0;
  function type(){
    if(i<text.length){
      document.getElementById("msg").innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,40);
    }
  }
  type();

  // slideshow (same photo repeat, तू बदलू शकतो)
  let images=["shivnya.jpg","shivnya.jpg"];
  let index=0;
  setInterval(()=>{
    index=(index+1)%images.length;
    document.getElementById("slide").src=images[index];
  },2000);
}

// sparkle click
document.addEventListener("click",function(e){
  let s=document.createElement("div");
  s.className="sparkle";
  s.innerHTML="✨";
  s.style.left=e.pageX+"px";
  s.style.top=e.pageY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});
</script>

</body>
</html>
