<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magic Shivnya</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
  overflow:hidden;
}

/* Input box */
.container {
  margin-top:100px;
}

input {
  padding:12px;
  font-size:18px;
  border-radius:10px;
  border:none;
}

button {
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
}

/* Card */
.card {
  display:none;
  margin-top:30px;
  padding:20px;
  border-radius:20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  animation:fadeIn 2s;
}

.name {
  font-size:28px;
  color:white;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow:0 0 10px pink;}
  to {text-shadow:0 0 20px white;}
}

/* Photo */
.card img {
  width:220px;
  border-radius:20px;
  box-shadow:0 0 20px pink;
  margin-top:10px;
}

/* Butterfly */
.butterfly {
  position:absolute;
  width:40px;
  animation:fly linear infinite;
}

@keyframes fly {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* Hearts */
.heart {
  position:absolute;
  font-size:20px;
  animation:float 6s linear infinite;
}

@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* Confetti */
.confetti {
  position:absolute;
  width:8px;
  height:8px;
  animation:fall 4s linear infinite;
}

@keyframes fall {
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(100vh);}
}

/* Typing */
.typing {
  color:white;
  margin-top:15px;
}

/* Fade */
@keyframes fadeIn {
  from{opacity:0;}
  to{opacity:1;}
}

/* Shake effect */
.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
</style>

</head>

<body>

<div class="container">
  <h2>Enter Full Secret Name 💖</h2>
  <input type="text" id="nameInput" placeholder="Type full name...">
  <button onclick="openMagic()">Unlock 🦋</button>

  <div class="card" id="card">
    <div class="name">Shivnya Deepak Gore 💖</div>
    <img src="shivnya.jpg">
    <p class="typing" id="msg"></p>
  </div>
</div>

<audio id="music" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
function openMagic(){

  let name=document.getElementById("nameInput").value.trim().toLowerCase();

  if(name==="shivnya deepak gore"){

    document.getElementById("card").style.display="block";
    document.getElementById("music").play();

    // butterflies
    for(let i=0;i<20;i++){
      let b=document.createElement("img");
      b.src="https://i.imgur.com/QZ6KQKZ.png";
      b.className="butterfly";
      b.style.left=Math.random()*100+"vw";
      b.style.animationDuration=(3+Math.random()*5)+"s";
      document.body.appendChild(b);
    }

    // hearts
    for(let i=0;i<15;i++){
      let h=document.createElement("div");
      h.innerHTML="❤️";
      h.className="heart";
      h.style.left=Math.random()*100+"vw";
      document.body.appendChild(h);
    }

    // confetti
    for(let i=0;i<40;i++){
      let c=document.createElement("div");
      c.className="confetti";
      c.style.left=Math.random()*100+"vw";
      c.style.background=["red","yellow","blue","green"][Math.floor(Math.random()*4)];
      document.body.appendChild(c);
    }

    // typing
    let text="You are magical, beautiful and truly special ✨💖";
    let i=0;
    function type(){
      if(i<text.length){
        document.getElementById("msg").innerHTML+=text.charAt(i);
        i++;
        setTimeout(type,40);
      }
    }
    type();

  } else {
    let input=document.getElementById("nameInput");
    input.classList.add("shake");
    setTimeout(()=>input.classList.remove("shake"),300);
    alert("Wrong full name ❌");
  }
}
</script>

</body>
</html>
